<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Trang Chủ - Capybara Tranh Shop</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background: url('assets/image/bg-capybara.webp') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .hero-section {
            background: rgba(255, 255, 255, 0.85);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }

        .shop-badge {
            background-color: #e0f2fe;
            color: #0369a1;
            padding: 6px 16px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-block;
            margin-bottom: 20px;
        }

        .btn-action {
            font-size: 1.05rem;
            font-weight: 600;
            padding: 12px 25px;
            border-radius: 50px;
            border: none;
            transition: all 0.3s ease;
            text-decoration: none; 
            display: inline-block;
            margin: 5px;
        }

        .btn-enter-shop {
            background-color: #28a745;
            color: white;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.4);
        }

        .btn-enter-shop:hover {
            background-color: #218838;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(33, 136, 56, 0.6);
        }

        .btn-about {
            background-color: #0284c7;
            color: white;
            box-shadow: 0 4px 15px rgba(2, 132, 199, 0.4);
        }

        .btn-about:hover {
            background-color: #0369a1;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(3, 105, 161, 0.6);
        }

        /* Định dạng nút liên hệ mới */
        .btn-contact {
            background-color: #f59e0b;
            color: white;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
        }

        .btn-contact:hover {
            background-color: #d97706;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(217, 119, 6, 0.6);
        }

        .capy-logo {
            max-width: 180px;
            border-radius: 50%;
            border: 5px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center text-center">
            <div class="col-md-9 col-lg-8">
                
                <div class="hero-section">
                    <img src="assets/image/avt-capybara.webp" alt="Capybara Logo" class="capy-logo">
                    
                    <div class="shop-badge">Chào mừng tới hội ghiền Capybara</div>
                    
                    <h1 class="fw-bold text-dark mb-3">Thế Giới Tranh Capybara Siêu Đáng Yêu</h1>
                    
                    <p class="text-muted fs-5 mb-4">
                        Nơi lưu trữ và cung cấp những khoảnh khắc hài hước, suy tình và ung dung nhất của "bộ trưởng bộ ngoại giao" làng động vật.
                    </p>
                    
                    <p class="text-muted fw-semibold mb-4">Nguyễn Quốc Huy Khương MSSV: 110125093</p> 
                    
                    <!-- Khối chứa 3 nút điều hướng chạy ngang hàng mượt mà -->
                    <div class="d-flex flex-wrap justify-content-center gap-1">
                        <a href="html/gioi-thieu.html" class="btn-action btn-about">
                            👤 Giới Thiệu
                        </a>
                        <a href="html/san-pham.html" class="btn-action btn-enter-shop">
                            🛒 Khám Phá Cửa Hàng 
                        </a>
                        <a href="html/lien-he.html" class="btn-action btn-contact">
                            📞 Liên Hệ Ngay
                        </a>
                    </div>
                </div>
                
            </div>
        </div>
    </div>

</body>
</html>
