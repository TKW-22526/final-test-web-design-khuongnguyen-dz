<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Thiết kế trang giới thiệu thông tin sản phẩm</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        body {
            background: url('../assets/image/capybara11.webp') no-repeat center center fixed;
            background-size: cover;
            color: #333333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        .main-title {
            color: #2b7a42;
            font-weight: 700;
            border-bottom: 2px solid #a8c4b2;
            padding-bottom: 10px;
            display: inline-block;
            background: rgba(255, 255, 255, 0.85);
            padding-left: 20px;
            padding-right: 20px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
        }

        .search-container {
            display: flex;
            justify-content: center;
            align-items: center;
            max-width: 550px;
            margin: 20px auto 40px auto;
            padding: 0 15px;
            position: relative;
        }

        #search-input {
            width: 100%;
            padding: 8px 45px 8px 20px;
            font-size: 15px;
            border: 1px solid #c2d6c7;
            background-color: rgba(250, 253, 250, 0.9);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            outline: none;
            transition: all 0.3s ease;
        }

        #search-input:focus {
            border-color: #28a745; 
            box-shadow: 0 0 5px rgba(40, 167, 69, 0.2);
        }

        .search-btn {
            position: absolute;
            right: 30px;
            background: none;
            border: none;
            color: #666666;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: color 0.3s ease;
        }

        .search-btn:hover {
            color: #28a745; 
        }

        #product-list > div {
            flex: 0 0 25% !important;
            max-width: 25% !important;
            padding: 10px !important;
            display: flex;
            flex-direction: column;
        }

        #product-list .card, #product-list > div > div {
            background: rgba(255, 255, 255, 0.85) !important;
            backdrop-filter: blur(8px) !important;
            border: 1px solid rgba(255, 255, 255, 0.4) !important;
            border-radius: 15px !important;
            padding: 15px !important;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1) !important;
            transition: transform 0.3s ease, box-shadow 0.3s ease !important;
        }

        #product-list > div > div:hover, #product-list .card:hover {
            transform: translateY(-5px) !important;
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.15) !important;
            background: rgba(255, 255, 255, 0.95) !important;
        }

        #product-list img {
            width: 100% !important;
            height: 160px !important;
            object-fit: cover !important;
            border-radius: 10px !important;
            margin-bottom: 10px;
        }

        #product-list h3, #product-list h5, #product-list .card-title {
            color: #2b7a42 !important; 
            font-size: 16px !important;
            font-weight: bold !important;
            margin-top: 5px !important;
        }

        #product-list button, #product-list .btn {
            background-color: #28a745 !important;
            border-color: #28a745 !important;
            color: #ffffff !important;
            border-radius: 50px !important;
            font-weight: 600 !important;
            transition: all 0.3s ease;
        }

        #product-list button:hover, #product-list .btn:hover {
            background-color: #218838 !important;
            border-color: #218838 !important;
        }
        .navigation-box {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(5px);
            padding: 15px 25px;
            border-radius: 50px;
            display: inline-flex;
            gap: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .btn-nav {
            font-weight: 600;
            padding: 10px 25px;
            border-radius: 50px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-nav-home {
            background-color: #28a745;
            color: white;
        }

        .btn-nav-home:hover {
            background-color: #218838;
            color: white;
            transform: translateY(-2px);
        }

        .btn-nav-contact {
            background-color: #f59e0b;
            color: white;
        }

        .btn-nav-contact:hover {
            background-color: #d97706;
            color: white;
            transform: translateY(-2px);
        }

        @media (max-width: 992px) {
            #product-list > div {
                flex: 0 0 50% !important;
                max-width: 50% !important;
            }
        }
    </style>
</head>
<body>
    <div class="container mt-5 mb-5">
        <div class="text-center mb-4">
            <h1 class="main-title">Danh Sách Sản Phẩm</h1>
        </div>
        
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Tìm kiếm sản phẩm Capybara..." onkeyup="filterProducts()">
            <button class="search-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
                </svg>
            </button>
        </div>
        <div id="product-list" class="row mb-5"></div>
        <div class="text-center mt-4">
            <div class="navigation-box">
                <a href="../index.html" class="btn-nav btn-nav-home">🏠 Thoát về trang chủ</a>
                <a href="lien-he.html" class="btn-nav btn-nav-contact">📞 Liên hệ cửa hàng</a>
            </div>
        </div>
    </div>

    <script src="../js/script.js?v=2"></script>
    <script>
        if (typeof loadAllproducts === 'function') {
            loadAllproducts();
        } else if (typeof loadAllProducts === 'function') {
            loadAllProducts();
        }

        function filterProducts() {
            let keyword = document.getElementById('search-input').value.toLowerCase();
            let productItems = document.querySelectorAll('#product-list > div');

            productItems.forEach(item => {
                let itemText = item.innerText.toLowerCase();
                
                if (itemText.includes(keyword)) {
                    item.style.setProperty('display', 'flex', 'important');
                } else {
                    item.style.setProperty('display', 'none', 'important');
                }
            });
        }
    </script>
</body>
</html>
