<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Thiết kế trang giới thiệu thông tin sản phẩm</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="../js/script.js"></script>

    <style>
        body {
            background-color: #eef5ed; /* Màu nền xanh lá siêu nhẹ, dịu mắt */
            color: #333333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .main-title {
            color: #2b7a42; /* Màu tiêu đề xanh lá đậm rõ ràng */
            font-weight: 700;
            border-bottom: 2px solid #a8c4b2; /* Đường gạch chân xanh lá nhạt */
            padding-bottom: 10px;
            display: inline-block;
        }

        .search-container {
            display: flex;
            justify-content: center;
            align-items: center;
            max-width: 550px;
            margin: 20px auto 40px auto;
            padding: 0 15px;
            position: relative;
        }

        #search-input {
            width: 100%;
            padding: 8px 45px 8px 20px;
            font-size: 15px;
            border: 1px solid #c2d6c7;
            background-color: #fafdface;
            border-radius: 20px;
            outline: none;
            transition: all 0.3s ease;
        }

        #search-input:focus {
            border-color: #28a745; /* Đổi viền ô tìm kiếm thành xanh lá khi click */
            box-shadow: 0 0 5px rgba(40, 167, 69, 0.2);
        }

        .search-btn {
            position: absolute;
            right: 30px;
            background: none;
            border: none;
            color: #666666;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: color 0.3s ease;
        }

        .search-btn:hover {
            color: #28a745; /* Nút kính lúp chuyển xanh lá khi rê chuột */
        }

        #product-list > div {
            flex: 0 0 25% !important;
            max-width: 25% !important;
            padding: 10px !important;
            display: flex;
            flex-direction: column;
        }

        #product-list img {
            width: 100% !important;
            height: 160px !important;
            object-fit: cover !important;
            border-radius: 6px !important;
            margin-bottom: 10px;
        }

        #product-list h3, #product-list h5, #product-list .card-title {
            color: #2b7a42 !important; /* Chuyển tên các sản phẩm thành màu xanh lá */
            font-size: 16px !important;
            font-weight: bold !important;
            margin-top: 5px !important;
        }

        /* Tự động chuyển màu cho bất kỳ thẻ button/nút nào nằm bên trong ô sản phẩm do JS tạo ra */
        #product-list button, #product-list .btn {
            background-color: #28a745 !important;
            border-color: #28a745 !important;
            color: #ffffff !important;
            transition: all 0.3s ease;
        }

        #product-list button:hover, #product-list .btn:hover {
            background-color: #218838 !important;
            border-color: #218838 !important;
        }

        @media (max-width: 992px) {
            #product-list > div {
                flex: 0 0 50% !important;
                max-width: 50% !important;
            }
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="text-center mb-4">
            <h2 class="main-title">Danh Sách Sản Phẩm Capybara</h2>
        </div>
        
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Tìm kiếm sản phẩm Capybara..." onkeyup="filterProducts()">
            <button class="search-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
                </svg>
            </button>
        </div>
        
        <div id="product-list" class="row"></div>
    </div>

    <script>
        loadAllproducts();

        function filterProducts() {
            let keyword = document.getElementById('search-input').value.toLowerCase();
            let productItems = document.querySelectorAll('#product-list > div');

            productItems.forEach(item => {
                let itemText = item.innerText.toLowerCase();
                
                if (itemText.includes(keyword)) {
                    item.style.setProperty('display', 'flex', 'important');
                } else {
                    item.style.setProperty('display', 'none', 'important');
                }
            });
        }
    </script>
</body>
</html>
