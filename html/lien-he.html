<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Liên Hệ - Capybara Tranh Shop</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background: url('../assets/image/capybara11.webp') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .contact-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.4);
        }

        .form-control:focus {
            border-color: #28a745;
            box-shadow: 0 0 5px rgba(40, 167, 69, 0.3);
        }

        .btn-submit {
            background-color: #28a745;
            color: white;
            font-weight: 600;
            border-radius: 50px;
            padding: 10px 30px;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            background-color: #218838;
            color: white;
            transform: translateY(-2px);
        }

        .btn-home {
            background-color: #6c757d;
            color: white;
            font-weight: 600;
            border-radius: 50px;
            padding: 10px 25px;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .btn-home:hover {
            background-color: #5a6268;
            color: white;
            transform: translateY(-2px);
        }

        .footer-info {
            background-color: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            font-size: 0.95rem;
            border-left: 4px solid #28a745;
        }
    </style>
</head>
<body>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                
                <div class="contact-card">
                    <h2 class="fw-bold text-center text-dark mb-4">Gửi Thông Tin Liên Hệ</h2>
                    
                    <!-- Khung điền thông tin -->
                    <form onsubmit="alert('Cảm ơn bạn đã liên hệ! Thông tin đã được ghi nhận.'); return false;">
                        <div class="mb-3 text-start">
                            <label for="customer-name" class="form-label fw-semibold text-secondary">Họ và tên:</label>
                            <input type="text" class="form-control" id="customer-name" placeholder="Nhập họ và tên của bạn" required>
                        </div>
                        
                        <div class="mb-4 text-start">
                            <label for="customer-phone" class="form-label fw-semibold text-secondary">Số điện thoại:</label>
                            <input type="tel" class="form-control" id="customer-phone" placeholder="Nhập số điện thoại" required>
                        </div>
                        
                        <div class="text-center mb-4">
                            <button type="submit" class="btn-submit w-100">Gửi Liên Hệ</button>
                        </div>
                    </form>

                    <!-- Thông tin hỗ trợ ở phía dưới cùng trang -->
                    <div class="footer-info text-start text-muted mt-2">
                        <p class="mb-2 class-text text-dark fw-medium">Có vấn đề gì về sản phẩm vui lòng liên hệ vào thông tin trên:</p>
                        <p class="mb-1"><strong>Gmail:</strong> nkhuonh06@gmail.com</p>
                        <p class="mb-0"><strong>Số điện thoại:</strong> 0393847348</p>
                    </div>

                    <div class="mt-4 text-center">
                        <a href="../index.html" class="btn-home">🏠 Về Trang Chủ</a>
                    </div>
                </div>
                
            </div>
        </div>
    </div>

</body>
</html>
